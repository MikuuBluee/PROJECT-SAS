<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Gallery</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Axios CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100 p-4">
  <h1 class="text-2xl font-bold mb-4 text-center">Daftar Produk</h1>

  <!-- Responsive grid: 1 kolom di mobile, 2 di tablet, 3 di desktop -->
  <div id="product-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

  <!-- Modal for product detail -->
  <div id="product-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white rounded-lg p-4 w-11/12 max-w-md relative">
      <button id="modal-close" class="absolute top-2 right-2 text-gray-500 hover:text-gray-700 text-xl">&times;</button>
      <img id="modal-image" class="w-full h-48 object-cover mb-2 rounded" alt="Product Image" />
      <h2 id="modal-title" class="text-lg font-semibold mb-1"></h2>
      <p id="modal-description" class="text-sm mb-2"></p>
      <p id="modal-price" class="text-base font-bold mb-3"></p>
      <button id="buy-button" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Beli</button>
    </div>
  </div>

  <script>
    const fallbackProducts = [
      { name: 'Prod Dummy 1', price: 100000, imageUrl: 'https://via.placeholder.com/300x200', description: 'Desc dummy 1.', paymentUrl: '#' },
      { name: 'Prod Dummy 2', price: 200000, imageUrl: 'https://via.placeholder.com/300x200', description: 'Desc dummy 2.', paymentUrl: '#' }
    ];
    const apiEndpoint = '/api/products';

    async function fetchProducts() {
      try {
        const { data } = await axios.get(apiEndpoint);
        renderCards(data);
      } catch {
        renderCards(fallbackProducts);
      }
    }

    function renderCards(arr) {
      const container = document.getElementById('product-container');
      container.innerHTML = '';
      arr.forEach(p => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded shadow p-3 cursor-pointer hover:shadow-md';
        card.innerHTML = `
          <img src="${p.imageUrl}" alt="${p.name}" class="w-full h-32 object-cover rounded mb-2" />
          <h3 class="text-sm font-medium">${p.name}</h3>
          <p class="text-xs text-gray-600">Rp${p.price.toLocaleString()}</p>
        `;
        card.onclick = () => showDetail(p);
        container.appendChild(card);
      });
    }

    function showDetail(p) {
      document.getElementById('modal-image').src = p.imageUrl;
      document.getElementById('modal-title').textContent = p.name;
      document.getElementById('modal-description').textContent = p.description;
      document.getElementById('modal-price').textContent = `Rp${p.price.toLocaleString()}`;
      document.getElementById('buy-button').onclick = () => location.href = p.paymentUrl;
      document.getElementById('product-modal').classList.replace('hidden','flex');
    }

    document.getElementById('modal-close').onclick = () => {
      document.getElementById('product-modal').classList.replace('flex','hidden');
    };

    fetchProducts();
  </script>
</body>
</html>
